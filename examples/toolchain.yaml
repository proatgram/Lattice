toolchain:
  default:
    compiler: g++
    languages: [c, cxx]
    paths:
      sysroot: / # If not specified, not given to the compiler.
      compiler: /usr/bin/gcc # If not specified, Lattice will try to find it for you.
      system_includes:
        - "/usr/include"
      library:
        - "/usr/lib"
    flags:
      compiler:
        - "-Wall"
        - "-O2"
      linker:
        - "--as-needed"
